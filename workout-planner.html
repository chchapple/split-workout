<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Workout Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .day-card {
            transition: all 0.3s ease;
        }
        .day-card:hover {
            transform: translateY(-2px);
        }
        .muscle-tag {
            transition: all 0.2s ease;
        }
        .muscle-tag:hover {
            transform: scale(1.05);
        }
        .warning-badge {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .exercise-input {
            transition: all 0.2s ease;
        }
        .exercise-input:focus {
            transform: scale(1.02);
        }
        .toast {
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        .toast-exit {
            animation: slideOut 0.3s ease-in;
        }
        @keyframes slideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(100%);
                opacity: 0;
            }
        }
        .loading-spinner {
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .btn-loading {
            position: relative;
            pointer-events: none;
            opacity: 0.7;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen p-4">
    <div class="max-w-7xl mx-auto">
        <!-- Toast Container -->
        <div id="toastContainer" class="fixed top-4 right-4 z-50 space-y-2"></div>

        <!-- Header -->
        <header class="text-center mb-8 pt-6">
            <h1 class="text-4xl font-bold text-gray-800 mb-2">
                <i class="fas fa-dumbbell text-indigo-600 mr-3"></i>
                Weekly Workout Planner
            </h1>
            <p class="text-gray-600">Plan your workouts and avoid overtraining muscle groups</p>
        </header>

        <!-- Warning Banner -->
        <div id="warningBanner" class="hidden bg-red-100 border-l-4 border-red-500 text-red-700 p-4 mb-6 rounded-lg">
            <div class="flex items-center">
                <i class="fas fa-exclamation-triangle mr-3"></i>
                <div>
                    <p class="font-bold">Muscle Group Conflict Detected!</p>
                    <p id="warningText" class="text-sm"></p>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <main class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 mb-8">
            <!-- Day cards will be generated here -->
        </main>

        <!-- Controls -->
        <section class="bg-white rounded-xl shadow-lg p-6 mb-6">
            <h2 class="text-xl font-semibold mb-4 text-gray-800">
                <i class="fas fa-cogs text-indigo-600 mr-2"></i>
                Controls
            </h2>
            <div class="flex flex-wrap gap-3">
                <button id="clearBtn" onclick="clearAll()" class="bg-gray-500 hover:bg-gray-600 text-white px-4 py-2 rounded-lg transition-colors flex items-center">
                    <i class="fas fa-trash mr-2"></i>Clear All
                </button>
                <button id="saveBtn" onclick="saveWorkout()" class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-lg transition-colors flex items-center">
                    <i class="fas fa-save mr-2"></i>Save Plan
                </button>
                <button id="loadBtn" onclick="loadWorkout()" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg transition-colors flex items-center">
                    <i class="fas fa-upload mr-2"></i>Load Plan
                </button>
                <button id="randomBtn" onclick="generateRandomPlan()" class="bg-purple-500 hover:bg-purple-600 text-white px-4 py-2 rounded-lg transition-colors flex items-center">
                    <i class="fas fa-dice mr-2"></i>Random Plan
                </button>
            </div>
        </section>

        <!-- Muscle Groups Reference -->
        <section class="bg-white rounded-xl shadow-lg p-6">
            <h2 class="text-xl font-semibold mb-4 text-gray-800">
                <i class="fas fa-list text-indigo-600 mr-2"></i>
                Available Muscle Groups
            </h2>
            <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-2">
                <span class="muscle-tag bg-blue-100 text-blue-800 px-3 py-1 rounded-full text-sm cursor-pointer hover:bg-blue-200" onclick="addMuscleToDay('Chest')">Chest</span>
                <span class="muscle-tag bg-green-100 text-green-800 px-3 py-1 rounded-full text-sm cursor-pointer hover:bg-green-200" onclick="addMuscleToDay('Back')">Back</span>
                <span class="muscle-tag bg-yellow-100 text-yellow-800 px-3 py-1 rounded-full text-sm cursor-pointer hover:bg-yellow-200" onclick="addMuscleToDay('Shoulders')">Shoulders</span>
                <span class="muscle-tag bg-red-100 text-red-800 px-3 py-1 rounded-full text-sm cursor-pointer hover:bg-red-200" onclick="addMuscleToDay('Biceps')">Biceps</span>
                <span class="muscle-tag bg-purple-100 text-purple-800 px-3 py-1 rounded-full text-sm cursor-pointer hover:bg-purple-200" onclick="addMuscleToDay('Triceps')">Triceps</span>
                <span class="muscle-tag bg-indigo-100 text-indigo-800 px-3 py-1 rounded-full text-sm cursor-pointer hover:bg-indigo-200" onclick="addMuscleToDay('Legs')">Legs</span>
                <span class="muscle-tag bg-pink-100 text-pink-800 px-3 py-1 rounded-full text-sm cursor-pointer hover:bg-pink-200" onclick="addMuscleToDay('Core')">Core</span>
                <span class="muscle-tag bg-gray-100 text-gray-800 px-3 py-1 rounded-full text-sm cursor-pointer hover:bg-gray-200" onclick="addMuscleToDay('Cardio')">Cardio</span>
                <span class="muscle-tag bg-teal-100 text-teal-800 px-3 py-1 rounded-full text-sm cursor-pointer hover:bg-teal-200" onclick="addMuscleToDay('Rest')">Rest</span>
            </div>
        </section>
    </div>

    <script>
        const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
        const muscleGroups = ['Chest', 'Back', 'Shoulders', 'Biceps', 'Triceps', 'Legs', 'Core', 'Cardio', 'Rest'];
        let selectedDay = null;
        let workoutData = {};

        // Toast notification system
        function showToast(message, type = 'success', duration = 3000) {
            const toastContainer = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            
            const icons = {
                success: 'fa-check-circle',
                error: 'fa-exclamation-circle',
                warning: 'fa-exclamation-triangle',
                info: 'fa-info-circle',
                loading: 'fa-spinner loading-spinner'
            };
            
            const colors = {
                success: 'bg-green-500',
                error: 'bg-red-500',
                warning: 'bg-yellow-500',
                info: 'bg-blue-500',
                loading: 'bg-gray-500'
            };
            
            toast.className = `toast flex items-center gap-3 px-4 py-3 rounded-lg shadow-lg text-white ${colors[type]} min-w-[250px]`;
            toast.innerHTML = `
                <i class="fas ${icons[type]} ${type === 'loading' ? 'loading-spinner' : ''}"></i>
                <span class="flex-1">${message}</span>
                ${type !== 'loading' ? '<button onclick="removeToast(this)" class="ml-2 hover:opacity-75"><i class="fas fa-times"></i></button>' : ''}
            `;
            
            toastContainer.appendChild(toast);
            
            if (type !== 'loading') {
                setTimeout(() => {
                    toast.classList.add('toast-exit');
                    setTimeout(() => {
                        if (toast.parentNode) {
                            toast.remove();
                        }
                    }, 300);
                }, duration);
            }
            
            return toast;
        }
        
        function removeToast(button) {
            const toast = button.closest('.toast');
            if (toast) {
                toast.classList.add('toast-exit');
                setTimeout(() => toast.remove(), 300);
            }
        }

        function setButtonLoading(buttonId, loading = true) {
            const button = document.getElementById(buttonId);
            if (!button) return;
            
            if (loading) {
                button.classList.add('btn-loading');
                const icon = button.querySelector('i');
                if (icon) {
                    icon.className = 'fas fa-spinner loading-spinner mr-2';
                }
            } else {
                button.classList.remove('btn-loading');
                const originalIcons = {
                    'clearBtn': 'fa-trash',
                    'saveBtn': 'fa-save',
                    'loadBtn': 'fa-upload',
                    'randomBtn': 'fa-dice'
                };
                const icon = button.querySelector('i');
                if (icon && originalIcons[buttonId]) {
                    icon.className = `fas ${originalIcons[buttonId]} mr-2`;
                }
            }
        }

        // Initialize the app
        function init() {
            const main = document.querySelector('main');
            main.innerHTML = '';
            
            days.forEach(day => {
                workoutData[day] = { muscleGroups: [], exercises: [] };
                const dayCard = createDayCard(day);
                main.appendChild(dayCard);
            });
            
            checkConflicts();
        }

        function createDayCard(day) {
            const card = document.createElement('div');
            card.className = 'day-card bg-white rounded-xl shadow-lg p-6';
            card.id = `day-${day}`;
            
            card.innerHTML = `
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg font-semibold text-gray-800">${day}</h3>
                    <button onclick="selectDay('${day}')" class="text-indigo-600 hover:text-indigo-800 transition-colors">
                        <i class="fas fa-edit"></i>
                    </button>
                </div>
                
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Muscle Groups:</label>
                    <div id="muscles-${day}" class="flex flex-wrap gap-1 min-h-[32px]">
                        <span class="text-gray-400 text-sm">Click edit to add muscle groups</span>
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Exercises:</label>
                    <div id="exercises-${day}" class="space-y-2">
                        <input type="text" placeholder="Add exercise..." 
                               class="exercise-input w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                               onkeypress="if(event.key==='Enter') addExercise('${day}', this.value, this)">
                    </div>
                </div>
            `;
            
            return card;
        }

        function selectDay(day) {
            selectedDay = day;
            showToast(`Editing ${day}'s workout`, 'info', 2000);
            showMuscleGroupModal(day);
        }

        function showMuscleGroupModal(day) {
            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50';
            modal.innerHTML = `
                <div class="bg-white rounded-xl p-6 max-w-md w-full mx-4">
                    <h3 class="text-xl font-semibold mb-4">Select Muscle Groups for ${day}</h3>
                    <div class="grid grid-cols-3 gap-2 mb-4">
                        ${muscleGroups.map(muscle => `
                            <button onclick="toggleMuscle('${day}', '${muscle}')" 
                                    id="muscle-btn-${muscle}"
                                    class="px-3 py-2 rounded-lg border-2 border-gray-200 hover:border-indigo-500 transition-colors">
                                ${muscle}
                            </button>
                        `).join('')}
                    </div>
                    <div class="flex justify-end gap-2">
                        <button onclick="closeModal()" class="px-4 py-2 bg-gray-300 text-gray-700 rounded-lg hover:bg-gray-400">
                            Cancel
                        </button>
                        <button onclick="closeModal()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">
                            Done
                        </button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            
            // Highlight selected muscles
            workoutData[day].muscleGroups.forEach(muscle => {
                const btn = document.getElementById(`muscle-btn-${muscle}`);
                if (btn) {
                    btn.classList.add('bg-indigo-600', 'text-white', 'border-indigo-600');
                }
            });
        }

        function toggleMuscle(day, muscle) {
            const index = workoutData[day].muscleGroups.indexOf(muscle);
            const btn = document.getElementById(`muscle-btn-${muscle}`);
            
            if (index > -1) {
                workoutData[day].muscleGroups.splice(index, 1);
                btn.classList.remove('bg-indigo-600', 'text-white', 'border-indigo-600');
                showToast(`Removed ${muscle} from ${day}`, 'info', 1500);
            } else {
                workoutData[day].muscleGroups.push(muscle);
                btn.classList.add('bg-indigo-600', 'text-white', 'border-indigo-600');
                showToast(`Added ${muscle} to ${day}`, 'success', 1500);
            }
        }

        function closeModal() {
            const modal = document.querySelector('.fixed.inset-0');
            if (modal) modal.remove();
            updateDayDisplay(selectedDay);
            checkConflicts();
            if (selectedDay) {
                const muscleCount = workoutData[selectedDay].muscleGroups.length;
                showToast(`Updated ${selectedDay}: ${muscleCount} muscle group${muscleCount !== 1 ? 's' : ''} selected`, 'success', 2000);
            }
        }

        function addMuscleToDay(muscle) {
            if (!selectedDay) {
                showToast('Please select a day first', 'warning', 2000);
                return;
            }
            
            if (workoutData[selectedDay].muscleGroups.includes(muscle)) {
                showToast(`${muscle} already added to ${selectedDay}`, 'warning', 2000);
                return;
            }
            
            workoutData[selectedDay].muscleGroups.push(muscle);
            updateDayDisplay(selectedDay);
            checkConflicts();
            showToast(`Added ${muscle} to ${selectedDay}`, 'success', 1500);
        }

        function addExercise(day, exercise, input) {
            if (!exercise.trim()) {
                showToast('Please enter an exercise name', 'warning', 2000);
                return;
            }
            
            if (workoutData[day].exercises.includes(exercise.trim())) {
                showToast('Exercise already exists', 'warning', 2000);
                return;
            }
            
            workoutData[day].exercises.push(exercise.trim());
            input.value = '';
            updateDayDisplay(day);
            showToast(`Added exercise: ${exercise.trim()}`, 'success', 1500);
        }

        function updateDayDisplay(day) {
            const musclesDiv = document.getElementById(`muscles-${day}`);
            const exercisesDiv = document.getElementById(`exercises-${day}`);
            
            // Update muscle groups
            if (workoutData[day].muscleGroups.length > 0) {
                musclesDiv.innerHTML = workoutData[day].muscleGroups.map(muscle => {
                    const colors = {
                        'Chest': 'bg-blue-100 text-blue-800',
                        'Back': 'bg-green-100 text-green-800',
                        'Shoulders': 'bg-yellow-100 text-yellow-800',
                        'Biceps': 'bg-red-100 text-red-800',
                        'Triceps': 'bg-purple-100 text-purple-800',
                        'Legs': 'bg-indigo-100 text-indigo-800',
                        'Core': 'bg-pink-100 text-pink-800',
                        'Cardio': 'bg-teal-100 text-teal-800',
                        'Rest': 'bg-gray-100 text-gray-800'
                    };
                    return `<span class="px-2 py-1 rounded-full text-xs ${colors[muscle] || 'bg-gray-100 text-gray-800'}">${muscle}</span>`;
                }).join('');
            } else {
                musclesDiv.innerHTML = '<span class="text-gray-400 text-sm">Click edit to add muscle groups</span>';
            }
            
            // Update exercises
            const exerciseInputs = exercisesDiv.querySelectorAll('input');
            exercisesDiv.innerHTML = workoutData[day].exercises.map(exercise => `
                <div class="flex items-center gap-2">
                    <i class="fas fa-check-circle text-green-500"></i>
                    <span class="text-sm text-gray-700">${exercise}</span>
                    <button onclick="removeExercise('${day}', '${exercise}')" class="text-red-500 hover:text-red-700">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            `).join('');
            
            // Add back the input field
            exercisesDiv.innerHTML += `
                <input type="text" placeholder="Add exercise..." 
                       class="exercise-input w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                       onkeypress="if(event.key==='Enter') addExercise('${day}', this.value, this)">
            `;
        }

        function removeExercise(day, exercise) {
            const index = workoutData[day].exercises.indexOf(exercise);
            if (index > -1) {
                workoutData[day].exercises.splice(index, 1);
                updateDayDisplay(day);
                showToast(`Removed exercise: ${exercise}`, 'info', 1500);
            } else {
                showToast('Exercise not found', 'error', 2000);
            }
        }

        function checkConflicts() {
            const warningBanner = document.getElementById('warningBanner');
            const warningText = document.getElementById('warningText');
            const conflicts = [];
            
            for (let i = 0; i < days.length - 1; i++) {
                const currentDay = days[i];
                const nextDay = days[i + 1];
                
                const currentMuscles = workoutData[currentDay].muscleGroups;
                const nextMuscles = workoutData[nextDay].muscleGroups;
                
                const conflictsFound = currentMuscles.filter(muscle => 
                    nextMuscles.includes(muscle) && muscle !== 'Rest' && muscle !== 'Cardio'
                );
                
                if (conflictsFound.length > 0) {
                    conflicts.push(`${currentDay} → ${nextDay}: ${conflictsFound.join(', ')}`);
                }
            }
            
            if (conflicts.length > 0) {
                warningBanner.classList.remove('hidden');
                warningText.textContent = conflicts.join(' | ');
            } else {
                warningBanner.classList.add('hidden');
            }
        }

        function clearAll() {
            if (confirm('Are you sure you want to clear all workout data? This action cannot be undone.')) {
                setButtonLoading('clearBtn', true);
                showToast('Clearing all workout data...', 'loading');
                
                setTimeout(() => {
                    try {
                        init();
                        setButtonLoading('clearBtn', false);
                        document.querySelector('.toast:last-child').remove();
                        showToast('All workout data cleared successfully', 'success', 3000);
                    } catch (error) {
                        setButtonLoading('clearBtn', false);
                        document.querySelector('.toast:last-child').remove();
                        showToast('Failed to clear workout data', 'error', 3000);
                    }
                }, 500);
            }
        }

        function saveWorkout() {
            setButtonLoading('saveBtn', true);
            const loadingToast = showToast('Saving workout plan...', 'loading');
            
            try {
                // Validate data before saving
                const hasData = days.some(day => 
                    workoutData[day].muscleGroups.length > 0 || workoutData[day].exercises.length > 0
                );
                
                if (!hasData) {
                    setButtonLoading('saveBtn', false);
                    loadingToast.remove();
                    showToast('No workout data to save', 'warning', 3000);
                    return;
                }
                
                const dataStr = JSON.stringify(workoutData, null, 2);
                const dataBlob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(dataBlob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `workout-plan-${new Date().toISOString().split('T')[0]}.json`;
                link.click();
                URL.revokeObjectURL(url);
                
                setTimeout(() => {
                    setButtonLoading('saveBtn', false);
                    loadingToast.remove();
                    showToast('Workout plan saved successfully!', 'success', 3000);
                }, 500);
                
            } catch (error) {
                setButtonLoading('saveBtn', false);
                loadingToast.remove();
                showToast('Failed to save workout plan', 'error', 3000);
            }
        }

        function loadWorkout() {
            setButtonLoading('loadBtn', true);
            const loadingToast = showToast('Loading workout plan...', 'loading');
            
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) {
                    setButtonLoading('loadBtn', false);
                    loadingToast.remove();
                    showToast('No file selected', 'warning', 2000);
                    return;
                }
                
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        
                        // Validate loaded data
                        let isValid = true;
                        days.forEach(day => {
                            if (!data[day] || !Array.isArray(data[day].muscleGroups) || !Array.isArray(data[day].exercises)) {
                                isValid = false;
                            }
                        });
                        
                        if (!isValid) {
                            throw new Error('Invalid workout plan format');
                        }
                        
                        workoutData = data;
                        days.forEach(day => updateDayDisplay(day));
                        checkConflicts();
                        
                        setButtonLoading('loadBtn', false);
                        loadingToast.remove();
                        showToast('Workout plan loaded successfully!', 'success', 3000);
                        
                    } catch (error) {
                        setButtonLoading('loadBtn', false);
                        loadingToast.remove();
                        showToast('Invalid file format. Please select a valid workout plan file.', 'error', 4000);
                    }
                };
                
                reader.onerror = () => {
                    setButtonLoading('loadBtn', false);
                    loadingToast.remove();
                    showToast('Failed to read file', 'error', 3000);
                };
                
                reader.readAsText(file);
            };
            
            input.click();
        }

        function generateRandomPlan() {
            setButtonLoading('randomBtn', true);
            const loadingToast = showToast('Generating random workout plan...', 'loading');
            
            setTimeout(() => {
                try {
                    const plans = [
                        { Monday: ['Chest', 'Triceps'], Tuesday: ['Back', 'Biceps'], Wednesday: ['Rest'], Thursday: ['Legs'], Friday: ['Shoulders', 'Core'], Saturday: ['Cardio'], Sunday: ['Rest'] },
                        { Monday: ['Legs'], Tuesday: ['Rest'], Wednesday: ['Chest', 'Shoulders'], Thursday: ['Back', 'Core'], Friday: ['Rest'], Saturday: ['Biceps', 'Triceps'], Sunday: ['Cardio'] },
                        { Monday: ['Cardio'], Tuesday: ['Chest'], Wednesday: ['Back'], Thursday: ['Legs'], Friday: ['Shoulders'], Saturday: ['Core'], Sunday: ['Rest'] },
                        { Monday: ['Full Body'], Tuesday: ['Rest'], Wednesday: ['Cardio'], Thursday: ['Legs'], Friday: ['Upper Body'], Saturday: ['Rest'], Sunday: ['Yoga/Stretching'] }
                    ];
                    
                    const randomPlan = plans[Math.floor(Math.random() * plans.length)];
                    
                    days.forEach(day => {
                        workoutData[day].muscleGroups = randomPlan[day] || ['Rest'];
                        workoutData[day].exercises = [];
                        updateDayDisplay(day);
                    });
                    
                    checkConflicts();
                    
                    setButtonLoading('randomBtn', false);
                    loadingToast.remove();
                    showToast('Random workout plan generated successfully!', 'success', 3000);
                    
                } catch (error) {
                    setButtonLoading('randomBtn', false);
                    loadingToast.remove();
                    showToast('Failed to generate random plan', 'error', 3000);
                }
            }, 800);
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', () => {
            init();
            showToast('Workout Planner loaded successfully!', 'success', 2000);
        });
    </script>
</body>
</html>
